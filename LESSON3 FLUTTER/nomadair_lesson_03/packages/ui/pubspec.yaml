name: nomadair_ui
description: >
  NomadAir UI package. Widget library, NomadAirTheme, and
  component system. Depends on nomadair_core for design tokens.
  Must never import from nomadair_data.
version: 0.0.1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  nomadair_core:
    path: ../core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
